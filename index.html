<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noob Club - CS2 Team Balancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: #0f172a url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0;
        }
        .overlay {
            background-color: rgba(15, 23, 42, 0.85);
            min-height: 100vh;
            width: 100%;
        }
        .card { 
            background-color: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(10px);
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .btn-action { cursor: pointer; transition: transform 0.2s; }
        .btn-action:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<div class="overlay p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-7xl font-black text-orange-500 uppercase tracking-tighter mb-1">Noob Club</h1>
            <p class="text-blue-400 font-mono text-lg tracking-[0.4em] uppercase font-bold">Montagsrunde Team Balancer</p>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            
            <!-- 1. SPIELER POOL -->
            <div class="card">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-orange-400 flex justify-between items-center text-orange-400 font-bold">
                    <span>Spieler-Pool</span>
                    <span id="playerCount" class="text-xs bg-blue-600 px-2 py-1 rounded text-white font-bold">0</span>
                </h2>
                
                <div class="space-y-3 mb-6 bg-black/40 p-4 rounded-lg">
                    <input type="text" id="newName" placeholder="Name" class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white outline-none focus:border-orange-500 transition text-white">
                    <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-300">FaceIt Level:</span>
                        <input type="number" id="newSkill" value="3" min="1" max="10" class="w-20 p-2 rounded bg-gray-800 border border-gray-600 text-center text-orange-400 font-bold">
                    </div>
                    <button onclick="addPlayer()" class="w-full bg-green-600 hover:bg-green-500 py-2 rounded font-bold uppercase text-xs">Hinzufügen</button>
                </div>

                <div id="playerPool" class="space-y-2 max-h-[400px] overflow-y-auto pr-2">
                </div>
            </div>

            <!-- 2. ANWESENHEIT -->
            <div class="card">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-orange-400 text-center uppercase">Heute am Start?</h2>
                
                <div class="flex gap-2 mb-4">
                    <button onclick="toggleAll(true)" class="flex-1 bg-blue-600 hover:bg-blue-500 text-[10px] font-black py-2 rounded uppercase tracking-widest transition text-white">Alle auswählen</button>
                    <button onclick="toggleAll(false)" class="flex-1 bg-gray-700 hover:bg-gray-600 text-[10px] font-black py-2 rounded uppercase tracking-widest transition text-white">Auswahl leeren</button>
                </div>

                <div id="activeSelection" class="space-y-1 max-h-[400px] overflow-y-auto pr-1">
                </div>
                
                <button onclick="generateTeams()" class="w-full mt-6 bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl shadow-2xl transition transform active:scale-95 text-xl uppercase tracking-tighter">
                    TEAMS GENERIEREN
                </button>
            </div>

            <!-- 3. ERGEBNIS -->
            <div class="card">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-orange-400 text-center uppercase">Ergebnis</h2>
                <div id="result" class="space-y-4">
                    <p class="text-gray-500 italic text-center py-20">Noch keine Teams am Start.</p>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ldsugaxwovooetmjegwt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_RAVKlH8iHbbSxcd-7SV2qA_fj1ZkxOE';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let players = [];
    let teamA = [];
    let teamB = [];
    let teamAName = "Team A";
    let teamBName = "Team B";

    const funnyNamesPool = [
        "Die Spray-and-Pray Könige", "Die Silver-Surfer", "Ecke-Camper e.V.", "Blind-Flash Experten",
        "Die Exit-Fragger", "Eco-Enthusiasten", "P90-Rusher", "Bottom-Fragger United",
        "Team Whiff", "Die Smoke-Verfehler", "Dreckige Pistolen-Helden", "Die Master-Baited",
        "Schattenboxer am Spawn", "Die Flash-Opfer", "Full-Buy Verlierer"
    ];

    async function fetchPlayers() {
        const { data } = await _supabase.from('players').select('*').order('name', { ascending: true });
        if (data) { players = data; renderUI(); }
    }

    async function addPlayer() {
        const n = document.getElementById('newName');
        const s = document.getElementById('newSkill');
        if (!n.value.trim()) return;
        await _supabase.from('players').insert([{ name: n.value.trim(), skill: parseInt(s.value) }]);
        n.value = ""; fetchPlayers();
    }

    async function deletePlayer(id, name) {
        if (confirm(`${name} löschen?`)) {
            await _supabase.from('players').delete().eq('id', id);
            fetchPlayers();
        }
    }

    async function editPlayer(id, currentName, currentSkill) {
        const newName = prompt("Name ändern:", currentName);
        const newSkill = prompt("Level ändern (1-10):", currentSkill);
        if (newName === null || newSkill === null) return;
        await _supabase.from('players').update({ name: newName, skill: parseInt(newSkill) }).eq('id', id);
        fetchPlayers();
    }

    function renderUI() {
        const pool = document.getElementById('playerPool');
        const select = document.getElementById('activeSelection');
        document.getElementById('playerCount').innerText = players.length;
        pool.innerHTML = ""; select.innerHTML = "";

        players.forEach((p) => {
            pool.innerHTML += `
                <div class="flex justify-between items-center bg-gray-900/60 p-2 rounded border border-gray-700 text-xs transition hover:border-gray-500">
                    <span>${p.name} <span class="text-orange-400 font-bold ml-1">Lvl ${p.skill}</span></span>
                    <div class="flex gap-3">
                        <span onclick="editPlayer(${p.id}, '${p.name}', ${p.skill})" class="btn-action text-blue-400">✎</span>
                        <span onclick="deletePlayer(${p.id}, '${p.name}')" class="btn-action text-red-500 text-lg">×</span>
                    </div>
                </div>`;
            
            select.innerHTML += `
                <label class="flex items-center p-2 hover:bg-white/5 rounded cursor-pointer border-b border-white/5 transition">
                    <input type="checkbox" class="w-5 h-5 mr-3 accent-orange-500 p-check" data-name="${p.name}" data-skill="${p.skill}">
                    <span class="flex-grow text-sm font-bold tracking-wide">${p.name}</span>
                    <span class="text-xs font-mono text-orange-400 font-bold bg-black/40 px-2 rounded border border-white/10">Lvl ${p.skill}</span>
                </label>`;
        });
    }

    function toggleAll(status) {
        const checkboxes = document.querySelectorAll('.p-check');
        checkboxes.forEach(cb => cb.checked = status);
    }

    function generateTeams() {
        const checks = document.querySelectorAll('.p-check:checked');
        let selected = Array.from(checks).map(c => ({ name: c.dataset.name, skill: parseInt(c.dataset.skill) }));
        if (selected.length < 2) return alert("Wähle mindestens 2 Spieler!");

        selected.sort((a,b) => b.skill - a.skill);
        teamA = []; teamB = [];
        let sA = 0, sB = 0;
        selected.forEach(p => {
            if (sA <= sB) { teamA.push(p); sA += p.skill; }
            else { teamB.push(p); sB += p.skill; }
        });

        const shuffled = [...funnyNamesPool].sort(() => 0.5 - Math.random());
        teamAName = shuffled[0];
        teamBName = shuffled[1];

        displayTeams();
    }

    function swapPlayer(name, fromTeam) {
        if (fromTeam === 'A') {
            const idx = teamA.findIndex(p => p.name === name);
            teamB.push(teamA.splice(idx, 1)[0]);
        } else {
            const idx = teamB.findIndex(p => p.name === name);
            teamA.push(teamB.splice(idx, 1)[0]);
        }
        displayTeams();
    }

    function copyToDiscord() {
        if (teamA.length === 0 || teamB.length === 0) return;
        const sumA = teamA.reduce((a, b) => a + b.skill, 0);
        const sumB = teamB.reduce((a, b) => a + b.skill, 0);
        let text = `**--- Noob Club Teams ---**\n\n**${teamAName.toUpperCase()} (Pwr: ${sumA})**\n`;
        teamA.forEach(p => text += `• ${p.name} (Lvl ${p.skill})\n`);
        text += `\n**${teamBName.toUpperCase()} (Pwr: ${sumB})**\n`;
        teamB.forEach(p => text += `• ${p.name} (Lvl ${p.skill})\n`);
        text += `\n*Differenz: ${Math.abs(sumA - sumB)}*`;
        text += `\n\n**Nicht vergessen: !ready eingeben zum Starten!**`;
        
        navigator.clipboard.writeText(text).then(() => alert("Teams für Discord kopiert!"));
    }

    function copyConnect() {
        const cmd = "connect montagsrunde.noob.club:26807; password Heddesheim";
        navigator.clipboard.writeText(cmd).then(() => alert("Connect-Befehl kopiert!"));
    }

    function displayTeams() {
        const resDiv = document.getElementById('result');
        const sumA = teamA.reduce((a, b) => a + b.skill, 0);
        const sumB = teamB.reduce((a, b) => a + b.skill, 0);

        const renderList = (list, teamLabel) => list.map(p => `
            <li class="flex justify-between items-center bg-black/40 p-2 rounded my-1 text-xs border border-white/5">
                <span><span class="text-orange-400 font-bold mr-2">${p.skill}</span> ${p.name}</span>
                <button onclick="swapPlayer('${p.name}', '${teamLabel}')" class="text-lg hover:text-orange-500 px-2 transition">⇄</button>
            </li>
        `).join('');

        resDiv.innerHTML = `
            <div class="p-3 bg-blue-900/30 rounded-lg border-t-4 border-blue-500 shadow-lg">
                <div class="flex justify-between font-black text-blue-400 mb-2 uppercase italic text-[11px] tracking-tight">
                    <span>${teamAName}</span>
                    <span class="text-white">Pwr: ${sumA}</span>
                </div>
                <ul>${renderList(teamA, 'A')}</ul>
            </div>
            
            <div class="p-3 bg-orange-900/30 rounded-lg border-t-4 border-orange-500 shadow-lg mt-4">
                <div class="flex justify-between font-black text-orange-400 mb-2 uppercase italic text-[11px] tracking-tight">
                    <span>${teamBName}</span>
                    <span class="text-white">Pwr: ${sumB}</span>
                </div>
                <ul>${renderList(teamB, 'B')}</ul>
            </div>

            <div class="text-center p-2 bg-black/60 rounded border border-gray-700 mt-4 shadow-inner">
                <span class="text-[10px] text-gray-500 uppercase tracking-widest block mb-1">Differenz:</span>
                <span class="ml-2 font-black text-xl text-orange-500">${Math.abs(sumA - sumB)}</span>
            </div>

            <button onclick="copyToDiscord()" class="w-full mt-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded uppercase text-[10px] tracking-widest transition shadow-lg">
                Teams für Discord kopieren
            </button>
            
            <button onclick="copyConnect()" class="w-full mt-2 bg-gray-700 hover:bg-gray-600 text-white font-bold py-2 rounded uppercase text-[10px] tracking-widest transition shadow-lg border border-gray-600">
                Server Connect Befehl kopieren
            </button>
        `;
    }

    fetchPlayers();
</script>

</body>
</html>
