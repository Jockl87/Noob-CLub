<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noob Club - CS2 Team Balancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: #0f172a url('bg.png') no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0;
            height: 100vh;
        }
        .overlay {
            background-color: rgba(15, 23, 42, 0.85);
            min-height: 100vh;
            width: 100%;
        }
        .card { 
            background-color: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(10px);
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .btn-action { cursor: pointer; transition: transform 0.2s; }
        .btn-action:hover { transform: scale(1.2); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }
    </style>
</head>

    <div class="max-w-7xl mx-auto w-full flex-grow flex flex-col">
        
        <!-- Header -->
        <div class="text-center mb-8 shrink-0">
            <h1 class="text-7xl font-black text-orange-500 uppercase tracking-tighter mb-1">Noob Club</h1>
            <p class="text-blue-400 font-mono text-lg tracking-[0.4em] uppercase font-bold">Montagsrunde Team Balancer</p>
        </div>

                    <span>Spieler-Pool</span>
                    <span id="playerCount" class="text-xs bg-blue-600 px-2 py-1 rounded text-white">0</span>
                </h2>
