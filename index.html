<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noob Club - CS2 Team Balancer</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>

            height: 100vh;

        .overlay {

        .card {

            padding: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .btn-action { cursor: pointer; transition: transform 0.2s; }
        .btn-action:hover { transform: scale(1.2); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }

</head>

        </div>

        <div class="grid lg:grid-cols-3 gap-8 flex-grow pb-8 min-h-0">

                <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-orange-400 flex justify-between items-center shrink-0">
                    <span>Spieler-Pool</span>
                    <span id="playerCount" class="text-xs bg-blue-600 px-2 py-1 rounded text-white">0</span>
                </h2>
                
                <div class="space-y-3 mb-4 bg-black/40 p-4 rounded-lg shrink-0">
                    <input type="text" id="newName" placeholder="Name" class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white outline-none focus:border-orange-500 transition">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-sm text-gray-300">Level:</span>
                            <div class="group relative flex items-center justify-center cursor-help z-20">
                                <span class="text-gray-400 hover:text-blue-400 text-[10px] font-black border border-gray-500 hover:border-blue-400 rounded-full w-4 h-4 flex items-center justify-center transition">i</span>
                                <div class="absolute bottom-full left-0 lg:-left-4 mb-2 w-48 lg:w-56 p-2 bg-gray-900 border border-gray-600 text-gray-300 text-[10px] rounded shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all leading-tight">
                                    Unser internes Rating: Die stärksten Spieler der Runde setzen das Max-Level (10). Davon ausgehend skalieren wir alle anderen Spieler nach unten.
                                </div>
                            </div>
                        </div>
                        <input type="number" id="newSkill" value="3" min="1" max="10" class="w-20 p-2 rounded bg-gray-800 border border-gray-600 text-center text-orange-400 font-bold">
                    </div>
                    <button onclick="addPlayer()" class="w-full bg-green-600 hover:bg-green-500 py-2 rounded font-bold uppercase text-xs">Hinzufügen</button>
                </div>

                <div id="playerPool" class="space-y-2 overflow-y-auto pr-2 max-h-[300px] lg:max-h-full lg:flex-grow"></div>

                <div class="mt-4 lg:mt-auto pt-4 border-t border-gray-700 text-center shrink-0">
                    <!-- HIER DEINEN PAYPAL.ME NAMEN EINTRAGEN (Falls noch nicht gemacht) -->
                    <a href="https://paypal.me/DEIN_PAYPAL_ME_NAME" target="_blank" class="inline-block w-full bg-yellow-600 hover:bg-yellow-500 text-white text-[10px] font-black py-2 rounded uppercase tracking-widest transition shadow-lg">
                        💰 Server-Spende (PayPal)
                    </a>
                </div>
            </div>

            <!-- 2. ANWESENHEIT -->
            <div class="card flex flex-col h-auto lg:h-[70vh]">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-orange-400 text-center uppercase shrink-0">Heute am Start?</h2>
                
                <div class="flex gap-2 mb-4 shrink-0">
                    <button onclick="toggleAll(true)" class="flex-1 bg-blue-600 hover:bg-blue-500 text-[10px] font-black py-2 rounded uppercase tracking-widest transition text-white">Alle auswählen</button>
                    <button onclick="toggleAll(false)" class="flex-1 bg-gray-700 hover:bg-gray-600 text-[10px] font-black py-2 rounded uppercase tracking-widest transition text-white">Auswahl leeren</button>
                </div>

                <div id="activeSelection" class="space-y-1 overflow-y-auto pr-1 max-h-[300px] lg:max-h-full lg:flex-grow mb-4"></div>
                
                <button onclick="generateTeams()" class="w-full lg:mt-auto bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl shadow-2xl transition transform active:scale-95 text-xl uppercase tracking-tighter shrink-0">
                    TEAMS GENERIEREN
                </button>
            </div>

            <!-- 3. ERGEBNIS -->
            <div class="card flex flex-col h-auto lg:h-[70vh]">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-orange-400 text-center uppercase shrink-0">Ergebnis</h2>
                
                <div id="result" class="space-y-4 lg:flex-grow overflow-y-auto pr-1 flex flex-col min-h-[150px] lg:min-h-0">
                    <div class="flex-grow flex items-center justify-center">
                        <p class="text-gray-500 font-black tracking-tighter italic">Noch keine Teams am Start.</p>
                    </div>
                </div>
                
                <div id="resultButtons" class="mt-4 pt-4 border-t border-gray-700 shrink-0 hidden">
                    <button onclick="generateTeams()" class="w-full bg-orange-500 hover:bg-orange-400 text-white font-black py-2 rounded uppercase text-[10px] tracking-widest transition shadow-lg mb-2 border border-orange-400">
                        🎲 Teams neu mischen (Fair)
                    </button>
                    <button onclick="copyToDiscord()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded uppercase text-[10px] tracking-widest transition shadow-lg mb-2">
                        Teams für Discord kopieren
                    </button>
                    <button onclick="copyConnect()" class="w-full bg-gray-700 hover:bg-gray-600 text-white font-black py-2 rounded uppercase text-[10px] tracking-widest transition border border-gray-600 shadow-lg">
                        Server Connect Befehl kopieren
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>

    async function fetchPlayers() {
        try {
            const { data, error } = await _supabase.from('players').select('*').order('name', { ascending: true });
            if (error) console.error("Datenbank Fehler:", error);
            if (data) { players = data; renderUI(); }
        } catch (e) {
            console.error("Laden fehlgeschlagen:", e);
        }
    }

    async function addPlayer() {
        const n = document.getElementById('newName');
        const s = document.getElementById('newSkill');
        if (!n.value.trim()) return;
        await _supabase.from('players').insert([{ name: n.value.trim(), skill: parseInt(s.value) }]);
        n.value = ""; fetchPlayers();
    }

    async function deletePlayer(id, name) {
        if (confirm(`${name} löschen?`)) {
            await _supabase.from('players').delete().eq('id', id);
            fetchPlayers();
        }
    }

    async function editPlayer(id, currentName, currentSkill) {
        const newName = prompt("Name ändern:", currentName);
        const newSkill = prompt("Level ändern (1-10):", currentSkill);
        if (newName === null || newSkill === null) return;
        await _supabase.from('players').update({ name: newName, skill: parseInt(newSkill) }).eq('id', id);
        fetchPlayers();
    }
