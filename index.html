<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noob Club - CS2 Team Balancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: url('https://images.alphacoders.com/133/1331243.png') no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
        }
        /* Dunkles Overlay für bessere Lesbarkeit */
        .overlay {
            background-color: rgba(15, 23, 42, 0.85);
            min-height: 100vh;
        }
        .card { 
            background-color: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(8px);
            border-radius: 12px; 
            padding: 20px; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.5); 
            border: 1px solid rgba(74, 85, 104, 0.5); 
        }
        .btn-action { transition: all 0.2s; cursor: pointer; opacity: 0.8; }
        .btn-action:hover { opacity: 1; transform: scale(1.1); }
        .team-a { border-left: 4px solid #3b82f6; }
        .team-b { border-left: 4px solid #f97316; }
    </style>
</head>
<body>

<div class="overlay p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-6xl font-black text-orange-500 uppercase tracking-tighter drop-shadow-2xl">Noob Club</h1>
            <p class="text-blue-400 font-mono text-lg tracking-[0.3em] mt-2 uppercase font-bold">Montagsrunde Live Balancer</p>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            
            <!-- 1. SPIELER VERWALTEN -->
            <div class="card">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-orange-400 flex justify-between">
                    <span>Spieler-Pool</span>
                    <span id="playerCount" class="text-sm bg-blue-600 px-2 py-0.5 rounded">0</span>
                </h2>
                
                <div class="space-y-3 mb-6 bg-black/40 p-4 rounded-lg">
                    <input type="text" id="newName" placeholder="Neuer Spieler Name" class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white outline-none focus:border-orange-500">
                    <div class="flex items-center justify-between">
                        <span class="text-sm text-gray-300">FaceIt Level:</span>
                        <input type="number" id="newSkill" value="3" min="1" max="10" class="w-20 p-2 rounded bg-gray-800 border border-gray-600 text-center font-bold text-orange-400">
                    </div>
                    <button onclick="addPlayer()" class="w-full bg-green-600 hover:bg-green-500 py-2 rounded font-bold transition uppercase text-sm">Hinzufügen</button>
                </div>

                <div id="playerPool" class="space-y-2 max-h-[400px] overflow-y-auto pr-2 text-sm">
                    <!-- Liste -->
                </div>
            </div>

            <!-- 2. ANWESENHEIT -->
            <div class="card text-center">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-orange-400">Heute dabei?</h2>
                <div id="activeSelection" class="space-y-1 max-h-[500px] overflow-y-auto pr-1 text-left">
                    <!-- Checkboxen -->
                </div>
                <button onclick="generateTeams()" class="w-full mt-6 bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded shadow-xl transition transform active:scale-95 text-xl tracking-widest uppercase">
                    TEAMS GENERIEREN
                </button>
            </div>

            <!-- 3. ERGEBNIS & MANUELLER TAUSCH -->
            <div class="card">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-orange-400">Ergebnis</h2>
                <div id="result" class="space-y-4">
                    <p class="text-gray-500 italic text-center py-20">Noch keine Teams generiert.</p>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ldsugaxwovooetmjegwt.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_RAVKlH8iHbbSxcd-7SV2qA_fj1ZkxOE';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let players = [];
    let teamA = [];
    let teamB = [];

    async function fetchPlayers() {
        const { data } = await _supabase.from('players').select('*').order('name', { ascending: true });
        if (data) { players = data; renderUI(); }
    }

    async function addPlayer() {
        const n = document.getElementById('newName');
        const s = document.getElementById('newSkill');
        if (!n.value.trim()) return;
        await _supabase.from('players').insert([{ name: n.value.trim(), skill: parseInt(s.value) }]);
        n.value = ""; fetchPlayers();
    }

    async function deletePlayer(id) {
        if (confirm("Spieler wirklich löschen?")) {
            await _supabase.from('players').delete().eq('id', id);
            fetchPlayers();
        }
    }

    async function editPlayer(id, currentName, currentSkill) {
        const newName = prompt("Name ändern:", currentName);
        if (newName === null) return;
        const newSkill = prompt("FaceIt Level ändern (1-10):", currentSkill);
        if (newSkill === null) return;

        await _supabase.from('players').update({ 
            name: newName || currentName, 
            skill: parseInt(newSkill) || currentSkill 
        }).eq('id', id);
        fetchPlayers();
    }

    function renderUI() {
        const pool = document.getElementById('playerPool');
        const select = document.getElementById('activeSelection');
        document.getElementById('playerCount').innerText = players.length;
        pool.innerHTML = ""; select.innerHTML = "";

        players.forEach((p) => {
            pool.innerHTML += `
                <div class="flex justify-between items-center bg-gray-900/60 p-2 rounded border border-gray-700">
                    <span>${p.name} <span class="text-orange-400">(Lvl ${p.skill})</span></span>
                    <div class="flex gap-3">
                        <span onclick="editPlayer(${p.id}, '${p.name}', ${p.skill})" class="btn-action text-blue-400">✎</span>
                        <span onclick="deletePlayer(${p.id})" class="btn-action text-red-500">🗑</span>
                    </div>
                </div>`;
            
            select.innerHTML += `
                <label class="flex items-center p-2 hover:bg-white/10 rounded cursor-pointer transition border-b border-white/5">
                    <input type="checkbox" class="w-5 h-5 mr-3 accent-orange-500 p-check" data-name="${p.name}" data-skill="${p.skill}">
                    <span class="flex-grow text-sm font-semibold">${p.name}</span>
                    <span class="text-xs font-bold text-orange-400">Lvl ${p.skill}</span>
                </label>`;
        });
    }

    function generateTeams() {
        const checks = document.querySelectorAll('.p-check:checked');
        let selected = Array.from(checks).map(c => ({ name: c.dataset.name, skill: parseInt(c.dataset.skill) }));
        
        if (selected.length < 2) return alert("Wähle mindestens 2 Spieler!");

        // Automatischer Balance-Algorithmus (Greedy)
        selected.sort((a,b) => b.skill - a.skill);
        teamA = []; teamB = [];
        let sA = 0, sB = 0;

        selected.forEach(p => {
            if (sA <= sB) { teamA.push(p); sA += p.skill; }
            else { teamB.push(p); sB += p.skill; }
        });

        displayTeams();
    }

    // Funktion zum manuellen Verschieben
    function swapPlayer(name, fromTeam) {
        if (fromTeam === 'A') {
            const idx = teamA.findIndex(p => p.name === name);
            teamB.push(teamA.splice(idx, 1)[0]);
        } else {
            const idx = teamB.findIndex(p => p.name === name);
            teamA.push(teamB.splice(idx, 1)[0]);
        }
        displayTeams();
    }

    function displayTeams() {
        const resDiv = document.getElementById('result');
        const sumA = teamA.reduce((a, b) => a + b.skill, 0);
        const sumB = teamB.reduce((a, b) => a + b.skill, 0);

        const renderList = (list, teamLabel) => list.map(p => `
            <li class="flex justify-between items-center bg-black/40 p-2 rounded my-1 border border-white/5 text-sm">
                <span>${p.name} <span class="text-gray-500 text-xs">(Lvl ${p.skill})</span></span>
                <button onclick="swapPlayer('${p.name}', '${teamLabel}')" class="text-lg hover:text-orange-500 transition" title="In das andere Team verschieben">⇄</button>
            </li>
        `).join('');

        resDiv.innerHTML = `
            <div class="team-a p-3 bg-blue-900/20 rounded-lg">
                <div class="flex justify-between font-bold text-blue-400 mb-2 uppercase tracking-widest italic">
                    <span>Team A</span>
                    <span>Power: ${sumA}</span>
                </div>
                <ul>${renderList(teamA, 'A')}</ul>
            </div>
            
            <div class="team-b p-3 bg-orange-900/20 rounded-lg">
                <div class="flex justify-between font-bold text-orange-400 mb-2 uppercase tracking-widest italic">
                    <span>Team B</span>
                    <span>Power: ${sumB}</span>
                </div>
                <ul>${renderList(teamB, 'B')}</ul>
            </div>

            <div class="text-center text-xs font-bold py-2 bg-black/50 rounded border border-gray-700">
                DIFFERENZ: ${Math.abs(sumA - sumB)} PUNKTE
            </div>
        `;
    }

    fetchPlayers();
</script>

</body>
</html>
