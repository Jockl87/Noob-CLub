<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noob Club - CS2 Team Balancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            background: #0f172a url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0;
            /* height: 100vh entfernt, damit Mobile normal scrollen kann */
        }
        .overlay {
            background-color: rgba(15, 23, 42, 0.85);
            min-height: 100vh;
            width: 100%;
        }
        .card { 
            background-color: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(10px);
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }
        .btn-action { cursor: pointer; transition: transform 0.2s; }
        .btn-action:hover { transform: scale(1.2); }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }
    </style>
</head>
<body>

<!-- p-4 für Mobile, p-10 für Desktop -->
<div class="overlay p-4 lg:p-10 flex flex-col h-full">
    <div class="max-w-7xl mx-auto w-full flex-grow flex flex-col">
        
        <!-- Header (Skaliert jetzt für Mobile) -->
        <div class="text-center mb-6 lg:mb-8 shrink-0">
            <h1 class="text-5xl lg:text-7xl font-black text-orange-500 uppercase tracking-tighter mb-1">Noob Club</h1>
            <p class="text-blue-400 font-mono text-xs lg:text-lg tracking-[0.2em] lg:tracking-[0.4em] uppercase font-bold">Montagsrunde Team Balancer</p>
        </div>

        <!-- Grid: 1 Spalte auf Handy, 3 auf Desktop. Abstände optimiert -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 lg:gap-8 flex-grow pb-8 lg:min-h-0">
            
            <!-- 1. SPIELER POOL -->
            <!-- Auf Handy h-auto (passt sich an), auf Desktop feste Höhe h-[75vh] -->
            <div class="card flex flex-col h-auto lg:h-[75vh]">
                <h2 class="text-xl font-bold mb-4 border-b border-gray-600 pb-2 text-orange-400 flex justify-between items-center shrink-0">
                    <span>Spieler-Pool</span>
                    <span id="playerCount" class="text-xs bg-blue-600 px-2 py-1 rounded text-white">0</span>
                </h2>
                
                <div class="space-y-3 mb-4 bg-black/40 p-4 rounded-lg shrink-0">
                    <input type="text" id="newName" placeholder="Name" class="w-full p-2 rounded bg-gray-800 border border-gray-600 text-white outline-none focus:border-orange-500 transition">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <span class="text-sm text-gray-300">Level:</span>
                            <div class="group relative flex items-center justify-center cursor-help z-20">
                                <span class="text-gray-400 hover:text-blue-400 text-[10px] font-black border border-gray-500 hover:border-blue-400 rounded-full w-4 h-4 flex items-center justify-center transition">i</span>
                                <div class="absolute bottom-full left-0 lg:-left-4 mb-2 w-48 lg:w-56 p-2 bg-gray-900 border border-gray-600 text-gray-300 text-[10px] rounded shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all leading-tight">
                                    Unser internes Rating: Die stärksten Spieler der Runde setzen das Max-Level (10). Davon ausgehend skalieren wir alle anderen Spieler nach unten.
                                </div>
                            </div>
                        </div>
                        <input type="number" id="newSkill" value="3" min="1" max="10" class="w-20 p-2 rounded bg-gray-800 border border-gray-600 text-center text-orange-400 font-bold">
                    </div>
                    <button onclick="addPlayer()" class="w-full bg-green-600 hover:bg-green-500 py-2 rounded font-bold uppercase text-xs">Hinzufügen</button>
                </div>

                <!-- Auf Handy max-h, auf Desktop flex-grow -->
                <div id="playerPool" class="space-y-2 overflow-y-auto pr-2 max-h-[300px] lg:max-h-full lg:flex-grow"></div>

                <div class="mt-4 lg:mt-auto pt-4 border-t border-gray-700 text-center shrink-0">
                    <a href="https://www.paypal.com/cgi-bin/webscr?cmd=_donations&business=denis.gross92@web.de&currency_code=EUR" target="_blank" class="inline-block w-full bg-yellow-600 hover:bg-yellow-500 text-white text-[10px] font-black py-2 rounded uppercase tracking-widest transition shadow-lg">
                        💰 Server-Spende (PayPal)
                    </a>
