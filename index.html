<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noob Club Live-Balancer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #1a202c; color: white; font-family: 'Segoe UI', sans-serif; }
        .card { background-color: #2d3748; border-radius: 12px; padding: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.4); border: 1px solid #4a5568; }
        .btn-delete { color: #fc8181; transition: color 0.2s; font-size: 1.2rem; }
        .btn-delete:hover { color: #f56565; }
        .btn-edit { color: #63b3ed; transition: color 0.2s; margin-right: 12px; font-size: 1.1rem; }
        .btn-edit:hover { color: #4299e1; }
        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #2d3748; }
        ::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #718096; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="mainContent" class="max-w-6xl mx-auto">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold text-orange-500 uppercase tracking-tighter drop-shadow-lg">Noob Club Live</h1>
            <p class="text-gray-400 font-mono text-sm tracking-widest mt-2 uppercase">Montagsrunde Team Balancer</p>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            
            <!-- 1. SPIELER VERWALTEN -->
            <div class="card">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2 text-orange-400 flex items-center justify-between">
                    <span>Club-Mitglieder</span>
                    <span id="playerCount" class="text-xs bg-gray-700 px-2 py-1 rounded text-gray-300">0</span>
                </h2>
                
                <!-- Formular zum Hinzufügen -->
                <div class="space-y-3 mb-6 bg-gray-900/40 p-4 rounded-lg border border-gray-700">
                    <input type="text" id="newName" placeholder="Name (z.B. Get_Right)" class="w-full p-2 rounded bg-gray-800 border border-gray-700 text-white outline-none focus:border-orange-500 transition">
                    <div class="flex items-center justify-between gap-4">
                        <span class="text-sm text-gray-400">FaceIt Level:</span>
                        <input type="number" id="newSkill" value="3" min="1" max="10" class="w-20 p-2 rounded bg-gray-800 border border-gray-700 text-center font-bold text-orange-400">
                    </div>
                    <button onclick="addPlayer()" class="w-full bg-green-600 hover:bg-green-500 py-2 rounded font-bold transition shadow-md active:scale-95">
                        Spieler hinzufügen
                    </button>
                </div>

                <!-- Scrollbare Liste der Mitglieder -->
                <div id="playerPool" class="space-y-2 max-h-[400px] overflow-y-auto pr-2">
                    <p class="text-gray-500 text-center animate-pulse">Lade Club-Daten...</p>
                </div>
            </div>

            <!-- 2. ANWESENHEIT -->
            <div class="card">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2 text-orange-400">Wer spielt heute?</h2>
                <div class="flex justify-between mb-2 px-1">
                    <button onclick="toggleAll(true)" class="text-xs text-blue-400 hover:underline">Alle auswählen</button>
                    <button onclick="toggleAll(false)" class="text-xs text-gray-400 hover:underline">Auswahl löschen</button>
                </div>
                <div id="activeSelection" class="space-y-1 max-h-[500px] overflow-y-auto pr-1">
                    <!-- Checkboxen -->
                </div>
                <button onclick="balanceTeams()" class="w-full mt-6 bg-orange-600 hover:bg-orange-500 text-white font-bold py-4 rounded-xl shadow-lg transition transform active:scale-95 text-lg">
                    TEAMS GENERIEREN
                </button>
            </div>

            <!-- 3. ERGEBNIS -->
            <div class="card">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2 text-orange-400">Vorschlag</h2>
                <div id="result" class="space-y-4">
                    <div class="flex flex-col items-center justify-center h-64 text-gray-600 text-center">
                        <span class="text-5xl mb-4">⚖️</span>
                        <p class="italic">Wähle die anwesenden Noobs aus und klicke auf Generieren.</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // DEINE DATEN SIND JETZT FEST EINGEBAUT
        const SUPABASE_URL = 'https://ldsugaxwovooetmjegwt.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_RAVKlH8iHbbSxcd-7SV2qA_fj1ZkxOE';

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let players = [];

        // Daten laden
        async function fetchPlayers() {
            const { data, error } = await _supabase
                .from('players')
                .select('*')
                .order('name', { ascending: true });
            
            if (data) {
                players = data;
                renderUI();
            } else {
                console.error("Fehler beim Laden:", error);
            }
        }

        // Spieler hinzufügen
        async function addPlayer() {
            const nameInput = document.getElementById('newName');
            const skillInput = document.getElementById('newSkill');
            const name = nameInput.value.trim();
            const skill = parseInt(skillInput.value);

            if (!name) return alert("Bitte einen Namen eingeben!");

            const { error } = await _supabase.from('players').insert([{ name, skill }]);
            
            if (error) {
                alert("Fehler beim Speichern!");
            } else {
                nameInput.value = "";
                fetchPlayers();
            }
        }

        // Spieler löschen
        async function deletePlayer(id, name) {
            if (confirm(`Soll ${name} wirklich komplett aus der Liste gelöscht werden?`)) {
                const { error } = await _supabase.from('players').delete().eq('id', id);
                if (!error) fetchPlayers();
            }
        }

        // Skill Level ändern
        async function updateSkill(id, currentSkill, name) {
            const newSkill = prompt(`Neues FaceIt Level für ${name} (1-10):`, currentSkill);
            if (newSkill !== null) {
                const val = parseInt(newSkill);
                if (val >= 1 && val <= 10) {
                    const { error } = await _supabase.from('players').update({ skill: val }).eq('id', id);
                    if (!error) fetchPlayers();
                } else {
                    alert("Bitte eine Zahl zwischen 1 und 10 eingeben!");
                }
            }
        }

        // UI Zeichnen
        function renderUI() {
            const pool = document.getElementById('playerPool');
            const select = document.getElementById('activeSelection');
            const countLabel = document.getElementById('playerCount');
            
            pool.innerHTML = "";
            select.innerHTML = "";
            countLabel.innerText = players.length;

            players.forEach((p) => {
                // Spalte 1: Verwaltung
                pool.innerHTML += `
                    <div class="flex justify-between items-center bg-gray-800/40 p-2 rounded border border-gray-700/50 hover:border-gray-500 transition">
                        <span class="text-sm font-medium tracking-wide">${p.name} <span class="text-orange-400 font-bold ml-1">Lvl ${p.skill}</span></span>
                        <div class="flex items-center">
                            <button onclick="updateSkill(${p.id}, ${p.skill}, '${p.name}')" class="btn-edit" title="Level ändern">✎</button>
                            <button onclick="deletePlayer(${p.id}, '${p.name}')" class="btn-delete" title="Löschen">🗑</button>
                        </div>
                    </div>`;
                
                // Spalte 2: Auswahl
                select.innerHTML += `
                    <label class="flex items-center p-3 hover:bg-gray-700/50 rounded-lg cursor-pointer border-b border-gray-700/30 transition group">
                        <input type="checkbox" class="w-6 h-6 mr-4 accent-orange-500 p-check" data-name="${p.name}" data-skill="${p.skill}">
                        <span class="flex-grow font-medium group-hover:text-orange-300 transition">${p.name}</span>
                        <span class="bg-gray-900 px-3 py-1 rounded-full text-orange-400 font-mono text-xs border border-gray-700 font-bold">Lvl ${p.skill}</span>
                    </label>`;
            });
        }

        // Hilfsfunktion: Alle an/aus
        function toggleAll(state) {
            document.querySelectorAll('.p-check').forEach(cb => cb.checked = state);
        }

        // Team Balancing Algorithmus
        function balanceTeams() {
            const checks = document.querySelectorAll('.p-check:checked');
            let sel = Array.from(checks).map(c => ({ 
                name: c.dataset.name, 
                skill: parseInt(c.dataset.skill) 
            }));

            if (sel.length < 2) return alert("Wähle mindestens 2 Spieler aus!");
            
            // Greedy Algorithmus
            sel.sort((a,b) => b.skill - a.skill);
            let t1 = [], t2 = [], s1 = 0, s2 = 0;
            
            sel.forEach(p => {
                if (s1 <= s2) { t1.push(p); s1 += p.skill; }
                else { t2.push(p); s2 += p.skill; }
            });

            const renderT = (title, list, sum, color) => `
                <div class="bg-${color}-900/20 p-5 rounded-xl border border-${color}-500/30 shadow-lg">
                    <h3 class="font-black text-${color}-400 mb-3 flex justify-between items-center border-b border-${color}-500/20 pb-2">
                        <span class="tracking-widest">${title}</span>
                        <span class="text-xs bg-${color}-500/20 px-2 py-1 rounded text-white">Power: ${sum}</span>
                    </h3>
                    <ul class="space-y-2">${list.map(p => `
                        <li class="flex justify-between items-center bg-gray-900/30 p-2 rounded">
                            <span class="font-bold text-gray-200">${p.name}</span>
                            <span class="text-gray-500 font-mono text-xs font-bold uppercase">Level ${p.skill}</span>
                        </li>`).join('')}</ul>
                </div>`;

            document.getElementById('result').innerHTML = 
                renderT('TEAM A', t1, s1, 'blue') + 
                renderT('TEAM B', t2, s2, 'orange') + 
                `<div class="text-center p-2 bg-gray-900/50 rounded-lg border border-gray-700">
                    <p class="text-xs text-gray-400">Unfairness-Faktor: <span class="text-orange-500 font-bold">${Math.abs(s1-s2)} Punkte</span></p>
                </div>`;
        }

        // Initialisierung beim Start
        fetchPlayers();
    </script>
</body>
</html>
